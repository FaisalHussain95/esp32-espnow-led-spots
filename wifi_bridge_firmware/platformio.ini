[env:wifi-bridge-c3]
platform      = espressif32
board         = esp32-c3-devkitm-1
framework     = arduino
monitor_speed = 115200

; Set upload/monitor port before flashing
; upload_port  = COMX
; monitor_port = COMX

; OTA requires two app partitions — min_spiffs gives 1.8MB per slot
board_build.partitions = min_spiffs.csv

lib_deps =
    knolleary/PubSubClient @ ^2.8

; ── Credentials — edit the lines below before flashing ───────────────────────
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONFIG_WIFI_SSID=\"YourSSID\"
    -DCONFIG_WIFI_PASSWORD=\"YourPassword\"
    -DCONFIG_MQTT_BROKER_IP=\"192.168.1.x\"
    -DCONFIG_MQTT_PORT=1883
    -DCONFIG_MQTT_USER=\"\"
    -DCONFIG_MQTT_PASSWORD=\"\"
; ─────────────────────────────────────────────────────────────────────────────
