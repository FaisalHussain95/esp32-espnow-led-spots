[env:esp32c3supermini]
platform      = espressif32
board         = esp32-c3-devkitm-1
framework     = arduino
monitor_speed = 115200

; OTA requires two app partitions — min_spiffs gives 1.8MB per slot
board_build.partitions = min_spiffs.csv

; ── Credentials — edit the three lines below before flashing ─────────────────
; PMK must be 32 hex chars (= 16 bytes) and IDENTICAL on all spots + master.
; WiFi is used only for OTA HTTP downloads, not for normal operation.
; Credentials are written to NVS on first boot and survive OTA updates.
; To change credentials after first flash: add -DCONFIG_PROV_FORCE_RESET=1,
; flash once, then remove it and reflash.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONFIG_SPOT_ID=0x01
    -DCONFIG_ESPNOW_PMK=\"00000000000000000000000000000000\"
    -DCONFIG_WIFI_SSID=\"YourSSID\"
    -DCONFIG_WIFI_PASSWORD=\"YourPassword\"
    ; -DCONFIG_PROV_FORCE_RESET=1   ; uncomment to overwrite NVS, then remove
; ─────────────────────────────────────────────────────────────────────────────

; ESP32-C3 SuperMini uses native USB-Serial-JTAG — no CH340/CP2102
; Set upload_port / monitor_port to the correct COM port before flashing
upload_port  = COM9
monitor_port = COM9

; Prototype env (WROVER on COM6) — uncomment to revert
; [env:esp32wrover]
; platform              = espressif32
; board                 = esp32dev
; framework             = arduino
; monitor_speed         = 115200
; board_build.flash_mode = qio
; board_build.partitions = min_spiffs.csv
