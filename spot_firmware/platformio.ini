[env:esp32c3supermini]
platform      = espressif32
board         = esp32-c3-devkitm-1
framework     = arduino
monitor_speed = 115200

; ESP32-C3 SuperMini uses native USB-Serial-JTAG — no CH340/CP2102
; Set upload_port / monitor_port to the correct COM port before flashing
; upload_port  = COMX
; monitor_port = COMX

; Prototype env (WROVER on COM6) — uncomment to revert
; [env:esp32wrover]
; platform              = espressif32
; board                 = esp32dev
; framework             = arduino
; monitor_speed         = 115200
; board_build.flash_mode = qio
