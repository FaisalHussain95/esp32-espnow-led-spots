[env:esp32wrover]
platform     = espressif32
board        = esp32dev
framework    = arduino
monitor_speed = 115200

; WROVER has 8MB PSRAM — enable it and apply the required silicon errata fix
board_build.flash_mode  = qio
board_build.psram       = enabled

build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; esp_now.h is part of the Arduino-ESP32 core — no lib_deps needed

; To port to ESP32-C3 SuperMini (final hardware):
;   board        = esp32-c3-devkitm-1
;   Remove board_build.psram and -mfix-esp32-psram-cache-issue
;   Update pin defines in src/config.h
