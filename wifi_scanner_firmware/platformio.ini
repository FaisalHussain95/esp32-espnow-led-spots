[env:ttgo-lora32]
platform      = espressif32
board         = ttgo-lora32-v1
framework     = arduino
monitor_speed = 115200
upload_port   = COM7
monitor_port  = COM7

build_flags =
    -DBOARD_HAS_PSRAM=0

lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9
