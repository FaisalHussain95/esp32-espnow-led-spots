[env:master-c3]
platform      = espressif32
board         = esp32-c3-devkitm-1
framework     = arduino
monitor_speed = 115200
; Set upload/monitor port before flashing
upload_port  = COM8
monitor_port = COM8

; OTA requires two app partitions — min_spiffs gives 1.8MB per slot
board_build.partitions = min_spiffs.csv

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; ── ESP-NOW PMK — set to your 32-char hex key (must match all spots) ──────
    ; Credentials written to NVS on first boot, survive OTA.
    ; To change after first flash: add -DCONFIG_PROV_FORCE_RESET=1,
    ; flash once, then remove it and reflash.
    -DCONFIG_ESPNOW_PMK=\"00000000000000000000000000000000\"
    ; ── WiFi credentials — used only for OTA HTTP downloads ───────────────────
    -DCONFIG_WIFI_SSID=\"YourSSID\"
    -DCONFIG_WIFI_PASSWORD=\"YourPassword\"
    ; -DCONFIG_PROV_FORCE_RESET=1   ; uncomment to overwrite NVS, then remove

; SSD1306 OLED via I2C
lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9

; esp_now.h is part of the Arduino-ESP32 core — no lib_deps needed for ESP-NOW
